# CERG Crown Jewel Register Schema
# Governance for critical systems

criticality_tiers:
- tier: Tier 0
  description: Crown Jewel — loss would be catastrophic
  minimum_controls: All applicable controls at enhanced verification frequency
- tier: Tier 1
  description: Critical — loss would be severe
  minimum_controls: All applicable controls at standard verification frequency
- tier: Tier 2
  description: High — loss would be significant
  minimum_controls: All applicable controls
- tier: Tier 3
  description: Moderate — loss would be manageable
  minimum_controls: Priority controls
- tier: Tier 4
  description: Low — loss would be minor
  minimum_controls: Baseline controls
