name: CERG Validation

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: python -m pip install pytest

      - name: Run CERG catalog and link validator
        run: python tools/cerg-validate.py

      - name: Run validator tests
        run: python -m pytest tests/test_cerg_validate.py -q
